<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Map classic Segoe UI family names to the bundled variable/static fonts -->
  <alias binding="strong">
    <family>Segoe UI Light</family>
    <prefer>
      <family>Segoe UI Variable Static Text Light</family>
      <family>Segoe UI Variable</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>Segoe UI</family>
    <prefer>
      <family>Segoe UI Variable Static Text</family>
      <family>Segoe UI Variable</family>
    </prefer>
  </alias>
  <alias binding="strong">
    <family>Segoe UI Semibold</family>
    <prefer>
      <family>Segoe UI Variable Static Text Semibold</family>
      <family>Segoe UI Variable</family>
    </prefer>
  </alias>
</fontconfig>
